server:
  port: 8080

spring:
  application:
    name: library-api
  datasource:
    url: jdbc:h2:mem:library;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.asycoo.library: INFO
